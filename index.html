<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瀞川日禾-匯款資訊回報</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#F9F8F6]">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { CheckCircle, Send, AlertCircle, Loader2 } from 'lucide-react';
    import { initializeApp, getApps } from 'firebase/app';
    import { getAuth, initializeAuth, inMemoryPersistence, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, setDoc, onSnapshot, collection, arrayUnion } from 'firebase/firestore';

    // ==========================================
    // 1. Firebase 配置 (已對應您的專案)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDREvduzrja4xjF-RCpKa-qv45JZCw9tjI",
      authDomain: "gen-lang-client-0168131217.firebaseapp.com",
      projectId: "gen-lang-client-0168131217",
      storageBucket: "gen-lang-client-0168131217.firebasestorage.app",
      messagingSenderId: "620488371764",
      appId: "1:620488371764:web:d5eb9d1dff62d66bab2461"
    };

    const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
    
    let auth;
    try {
      auth = initializeAuth(app, { persistence: inMemoryPersistence });
    } catch (e) {
      auth = getAuth(app);
    }
    
    const db = getFirestore(app);
    const appId = 'qingsenyuan-admin'; 

    function App() {
      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [isReady, setIsReady] = useState(false);
      const [dbError, setDbError] = useState('');
      const [masterUnits, setMasterUnits] = useState({}); 

      const [formData, setFormData] = useState({ unitKey: '', remitDate: '', accountLast5: '', remitterName: '', amount: '', notes: '' });
      const [submitSuccess, setSubmitSuccess] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      useEffect(() => {
        signInAnonymously(auth).then(() => {
          setAuthReady(true);
        }).catch(err => {
          console.error("Auth Error:", err);
          setDbError("系統連線異常，請重新整理網頁。");
          setAuthReady(true);
        });

        const unsubscribeAuth = onAuthStateChanged(auth, (u) => setUser(u));
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!user || !authReady) return;
        
        const unsubMaster = onSnapshot(
          collection(db, 'artifacts', appId, 'public', 'data', 'master_sheets'), 
          (snap) => {
            const units = {};
            snap.forEach(docSnap => {
              const rows = docSnap.data().rows || [];
              rows.forEach(row => {
                let f = String(row['樓層'] || '').trim().replace(/\.0$/, '');
                let u = String(row['編號'] || '').trim().replace(/\.0$/, '');
                
                const combined = String(row['戶別'] || row['戶名'] || '').trim();
                if (combined && (!f || !u)) {
                  const match = combined.match(/^(\d+)([A-Z]\d*)$/i);
                  if (match) { f = match[1]; u = match[2]; } else { u = combined; }
                }

                if (f && u && !f.includes('合計')) {
                  const key = `${f}_${u}`;
                  if (!units[key]) {
                    units[key] = { floor: f, unit: u };
                  }
                }
              });
            });
            setMasterUnits(units);
            setIsReady(true);
          },
          (error) => {
            console.error("Permission Denied:", error);
            setDbError(error.message);
            setIsReady(true);
          }
        );
        return () => unsubMaster();
      }, [user, authReady]);

      const sortedKeys = Object.keys(masterUnits).sort((a, b) => {
        const parseF = (k) => parseInt(k.split('_')[0]) || 0;
        return parseF(a) - parseF(b) || a.localeCompare(b);
      });

      const handleFormSubmit = async (e) => {
        e.preventDefault();
        if (!user) { alert("尚未建立安全連線，請重新整理網頁再試。"); return; }

        setIsSubmitting(true);
        const newRemittance = {
          id: Date.now().toString(),
          unitKey: formData.unitKey,               
          匯款日期: formData.remitDate.replace(/-/g, '/'), 
          匯款金額: Number(formData.amount),
          帳號後五碼: formData.accountLast5, 
          匯款帳戶戶名: formData.remitterName,
          備註: formData.notes,
          _isCustom: true,                         
          submittedAt: new Date().toISOString()
        };

        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'pending_remittances');
          await setDoc(docRef, { remittances: arrayUnion(newRemittance) }, { merge: true });
          
          setSubmitSuccess(true);
          setFormData({ unitKey: '', remitDate: '', accountLast5: '', remitterName: '', amount: '', notes: '' });
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setTimeout(() => setSubmitSuccess(false), 10000);
        } catch (error) {
          console.error(error);
          alert("資料傳送失敗，請確認網路連線或聯繫管理員。");
        } finally {
          setIsSubmitting(false);
        }
      };

      if (dbError) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-[#F9F8F6] font-sans">
            <div className="bg-white p-8 rounded-2xl shadow-sm border border-red-200 text-center max-w-md w-full">
              <AlertCircle className="w-16 h-16 text-red-400 mx-auto mb-4" />
              <h2 className="text-xl font-bold text-gray-800 mb-3">⚠️ 系統連線異常</h2>
              <p className="text-sm text-gray-600 mb-4 leading-relaxed">
                無法連接至資料庫，請稍後再試。<br/>錯誤：{dbError}
              </p>
            </div>
          </div>
        );
      }

      if (!isReady) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-[#F9F8F6]">
            <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-[#8BA39E] mb-4"></div>
            <p className="text-[#8BA39E] font-medium text-sm">正在載入系統...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F9F8F6] text-[#4A4A4A] font-sans py-12 px-4 sm:px-6 lg:px-8">
          <div className="max-w-xl mx-auto bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-[#EAEAEA]">
            <div className="mb-8 text-center">
              <h2 className="text-2xl font-bold text-[#4A4A4A] tracking-tight mb-2 text-center pt-4">瀞川日禾-匯款資訊回報</h2>
              <p className="text-sm text-gray-400">請填寫您的匯款資訊以便我們對帳，謝謝您的配合。</p>
            </div>

            {submitSuccess && (
              <div className="mb-8 p-5 bg-green-50 border border-green-200 text-green-700 rounded-2xl flex items-start shadow-sm">
                <CheckCircle className="w-6 h-6 mr-3 flex-shrink-0 mt-0.5" />
                <div>
                  <p className="font-bold text-lg">回報資料已成功送出！</p>
                  <p className="text-sm mt-1 leading-relaxed">確認收到款項後，公司將透過官方 LINE 回覆給您，謝謝。</p>
                </div>
              </div>
            )}

            <form onSubmit={handleFormSubmit} className="space-y-6">
              {/* 戶別 */}
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2 border-l-4 border-[#8BA39E] pl-2 underline decoration-gray-200 underline-offset-4">
                  戶別 <span className="text-red-500">*</span>
                </label>
                <select 
                  required 
                  value={formData.unitKey} 
                  onChange={(e) => setFormData({...formData, unitKey: e.target.value})}
                  className="w-full px-4 py-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#8BA39E] outline-none bg-white transition-all text-lg"
                >
                  <option value="" disabled>點擊選擇您的戶別 (如: 2A1)</option>
                  {sortedKeys.map(key => (
                    <option key={key} value={key}>{masterUnits[key].floor}{masterUnits[key].unit}</option>
                  ))}
                </select>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {/* 匯款日期 */}
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2 border-l-4 border-[#8BA39E] pl-2 underline decoration-gray-200 underline-offset-4">
                    匯款日期 <span className="text-red-500">*</span>
                  </label>
                  <input type="date" required value={formData.remitDate} onChange={(e) => setFormData({...formData, remitDate: e.target.value})} className="w-full px-4 py-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#8BA39E] outline-none transition-all" />
                </div>
                {/* 匯款金額 */}
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2 border-l-4 border-[#8BA39E] pl-2 underline decoration-gray-200 underline-offset-4">
                    匯款金額 <span className="text-red-500">*</span>
                  </label>
                  <input type="number" required placeholder="請填寫匯款總額" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} className="w-full px-4 py-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#8BA39E] outline-none transition-all" />
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {/* 匯款帳戶戶名 */}
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2 border-l-4 border-[#8BA39E] pl-2 underline decoration-gray-200 underline-offset-4">
                    匯款帳戶戶名 <span className="text-red-500">*</span>
                  </label>
                  <input type="text" required placeholder="例如：王小明" value={formData.remitterName} onChange={(e) => setFormData({...formData, remitterName: e.target.value})} className="w-full px-4 py-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#8BA39E] outline-none transition-all" />
                </div>
                {/* 匯款帳號後五碼 */}
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2 border-l-4 border-[#8BA39E] pl-2 leading-tight underline decoration-gray-200 underline-offset-4">
                    匯款帳號後五碼 <span className="text-red-500">*</span>
                  </label>
                  <input 
                    type="text" 
                    required 
                    placeholder="(或可填寫 郵局匯款 / 現金存入)" 
                    value={formData.accountLast5} 
                    onChange={(e) => setFormData({...formData, accountLast5: e.target.value})} 
                    className="w-full px-4 py-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#8BA39E] outline-none transition-all placeholder:text-gray-300" 
                  />
                </div>
              </div>

              {/* 備註 (選填) */}
              <div>
                <label className="block text-sm font-bold text-gray-400 mb-2 border-l-4 border-gray-200 pl-2">備註 (選填)</label>
                <textarea rows="3" placeholder="若有特殊需求請註明..." value={formData.notes} onChange={(e) => setFormData({...formData, notes: e.target.value})} className="w-full px-4 py-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#8BA39E] outline-none resize-none transition-all"></textarea>
              </div>

              {/* 優化後的按鈕 */}
              <button 
                type="submit" 
                disabled={isSubmitting} 
                className={`
                  w-full flex justify-center items-center py-4.5 px-6
                  bg-gradient-to-r from-[#8BA39E] to-[#7A918C]
                  hover:from-[#7A918C] hover:to-[#6B807B]
                  text-white rounded-2xl font-bold text-lg 
                  shadow-[0_4px_14px_0_rgba(139,163,158,0.39)]
                  hover:shadow-[0_6px_20px_rgba(122,145,140,0.45)]
                  transform transition-all duration-300
                  ${isSubmitting ? 'opacity-70 cursor-not-allowed scale-100' : 'hover:scale-[1.02] active:scale-[0.98]'}
                `}
              >
                {isSubmitting ? (
                  <>
                    <Loader2 className="w-6 h-6 mr-2 animate-spin" />
                    資料安全傳送中...
                  </>
                ) : (
                  <>
                    <Send className="w-5 h-5 mr-2" />
                    確認送出回報
                  </>
                )}
              </button>
            </form>
          </div>
          
          <div className="mt-8 text-center text-gray-400 text-xs tracking-widest uppercase">
            © 瀞川建設建案管理系統 · 安全加密傳輸
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root')); 
    root.render(<App />);
  </script>
</body>
</html>
