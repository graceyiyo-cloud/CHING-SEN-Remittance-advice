<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瀞川日禾-匯款資訊回報</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#F9F8F6]">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { CheckCircle, Send, Building, AlertCircle } from 'lucide-react';
    import { initializeApp, getApps } from 'firebase/app';
    import { getAuth, initializeAuth, inMemoryPersistence, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, setDoc, onSnapshot, collection, arrayUnion } from 'firebase/firestore';

    // ==========================================
    // 已自動對齊您青森苑系統的專案配置
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDREvduzrja4xjF-RCpKa-qv45JZCw9tjI",
      authDomain: "gen-lang-client-0168131217.firebaseapp.com",
      projectId: "gen-lang-client-0168131217",
      storageBucket: "gen-lang-client-0168131217.firebasestorage.app",
      messagingSenderId: "620488371764",
      appId: "1:620488371764:web:d5eb9d1dff62d66bab2461"
    };

    const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
    
    // 【極致相容模式】強制不讀取 Cookie/LocalStorage，確保 LINE 與長輩手機不卡死
    let auth;
    try {
      auth = initializeAuth(app, { persistence: inMemoryPersistence });
    } catch (e) {
      auth = getAuth(app);
    }
    
    const db = getFirestore(app);
    const appId = 'qingsenyuan-admin'; // 對齊資料庫路徑

    function App() {
      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [isReady, setIsReady] = useState(false);
      const [dbError, setDbError] = useState('');
      const [masterUnits, setMasterUnits] = useState({}); 

      const [formData, setFormData] = useState({ unitKey: '', remitDate: '', accountLast5: '', remitterName: '', amount: '', notes: '' });
      const [submitSuccess, setSubmitSuccess] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      useEffect(() => {
        // 執行背景匿名登入
        signInAnonymously(auth)
          .then(() => setAuthReady(true))
          .catch(() => setAuthReady(true));

        const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
          if (u) setUser(u);
        });
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!user || !authReady) return;
        
        // 監聽母表以獲取最新的戶別選單
        const unsubMaster = onSnapshot(
          collection(db, 'artifacts', appId, 'public', 'data', 'master_sheets'), 
          (snap) => {
            const units = {};
            snap.forEach(docSnap => {
              const rows = docSnap.data().rows || [];
              rows.forEach(row => {
                let f = String(row['樓層'] || '').trim().replace(/\.0$/, '');
                let u = String(row['編號'] || '').trim().replace(/\.0$/, '');
                
                // 相容不同的表格標題
                const combined = String(row['戶別'] || row['戶名'] || '').trim();
                if (combined && (!f || !u)) {
                  const match = combined.match(/^(\d+)([A-Z]\d*)$/i);
                  if (match) { f = match[1]; u = match[2]; } else { u = combined; }
                }

                if (f && u && !f.includes('合計')) {
                  const key = `${f}_${u}`;
                  if (!units[key]) {
                    units[key] = { floor: f, unit: u };
                  }
                }
              });
            });
            setMasterUnits(units);
            setIsReady(true);
          },
          (error) => {
            console.error("載入權限異常:", error);
            setDbError(error.message);
            setIsReady(true);
          }
        );
        return () => unsubMaster();
      }, [user, authReady]);

      // 戶別排序邏輯：樓層數字 -> 編號字母
      const sortedKeys = Object.keys(masterUnits).sort((a, b) => {
        const fA = parseInt(a.split('_')[0]) || 0;
        const fB = parseInt(b.split('_')[0]) || 0;
        if (fA !== fB) return fA - fB;
        return a.localeCompare(b);
      });

      const handleFormSubmit = async (e) => {
        e.preventDefault();
        if (!user) { alert("尚未建立安全連線，請重新整理網頁。"); return; }

        setIsSubmitting(true);
        const newRemittance = {
          id: Date.now().toString(),
          unitKey: formData.unitKey,               
          匯款日期: formData.remitDate.replace(/-/g, '/'), 
          匯款金額: Number(formData.amount),
          帳號後五碼: formData.accountLast5,
          匯款帳戶戶名: formData.remitterName,
          備註: formData.notes,
          _isCustom: true,                         
          submittedAt: new Date().toISOString()
        };

        try {
          // 資料先進入「待對帳暫存區」
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'pending_remittances');
          await setDoc(docRef, { remittances: arrayUnion(newRemittance) }, { merge: true });
          
          setSubmitSuccess(true);
          setFormData({ unitKey: '', remitDate: '', accountLast5: '', remitterName: '', amount: '', notes: '' });
          setTimeout(() => setSubmitSuccess(false), 8000);
        } catch (error) {
          console.error(error);
          alert("傳送失敗，請確認網路或聯繫管理員。");
        } finally {
          setIsSubmitting(false);
        }
      };

      if (dbError) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-[#F9F8F6] font-sans">
            <div className="bg-white p-8 rounded-2xl shadow-sm border border-red-200 text-center max-w-md w-full">
              <AlertCircle className="w-16 h-16 text-red-400 mx-auto mb-4" />
              <h2 className="text-xl font-bold text-gray-800 mb-3">連線失敗</h2>
              <p className="text-sm text-gray-600 mb-4 text-left leading-relaxed">
                系統讀取權限不足。<br/><br/>
                請至 Firebase 控制台的 <strong>Authentication > Settings > Authorized domains</strong> 中，將 <strong>graceyiyo-cloud.github.io</strong> 網域新增進去即可解決。
              </p>
            </div>
          </div>
        );
      }

      if (!isReady) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-[#F9F8F6]">
            <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-[#8BA39E] mb-4"></div>
            <p className="text-[#8BA39E] font-medium text-sm">安全連線建立中...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F9F8F6] text-[#4A4A4A] font-sans py-12 px-4 sm:px-6 lg:px-8">
          <div className="max-w-xl mx-auto bg-white p-8 md:p-10 rounded-2xl shadow-sm border border-[#EAEAEA]">
            <div className="mb-8 text-center">
              <div className="w-16 h-16 bg-[#F0EFEA] rounded-full flex items-center justify-center mx-auto mb-4">
                <Building className="w-8 h-8 text-[#8BA39E]" />
              </div>
              <h2 className="text-2xl font-bold text-[#4A4A4A] tracking-wide mb-2">瀞川日禾-匯款資訊回報</h2>
              <p className="text-sm text-gray-500">感謝您的配合，請填寫匯款資料以便我們對帳。</p>
            </div>

            {submitSuccess && (
              <div className="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg flex items-center shadow-sm">
                <CheckCircle className="w-5 h-5 mr-3 flex-shrink-0" />
                <div>
                  <p className="font-bold">資料已成功送出！</p>
                  <p className="text-sm mt-1">確認收到款項後，公司會再LINE回覆給您，若有其他疑問可於官方LINE提出，謝謝。</p>
                </div>
              </div>
            )}

            <form onSubmit={handleFormSubmit} className="space-y-6">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1.5 font-bold">戶別</label>
                <select 
                  required value={formData.unitKey} onChange={(e) => setFormData({...formData, unitKey: e.target.value})}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none bg-white"
                >
                  <option value="" disabled>請選擇您的戶別</option>
                  {sortedKeys.map(key => (
                    <option key={key} value={key}>{masterUnits[key].floor}{masterUnits[key].unit}</option>
                  ))}
                </select>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5 font-bold">匯款日期</label>
                  <input type="date" required value={formData.remitDate} onChange={(e) => setFormData({...formData, remitDate: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5 font-bold">匯款金額 (新台幣)</label>
                  <input type="number" required placeholder="例如：50000" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5 font-bold">戶名 (匯款帳戶戶名)</label>
                  <input type="text" required placeholder="例如：王小明" value={formData.remitterName} onChange={(e) => setFormData({...formData, remitterName: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5 font-bold">帳號後五碼</label>
                  <input type="text" required maxLength="5" placeholder="例如：12345" value={formData.accountLast5} onChange={(e) => setFormData({...formData, accountLast5: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1.5 font-bold">備註 (選填)</label>
                <textarea rows="3" placeholder="有其他事項請註明於此" value={formData.notes} onChange={(e) => setFormData({...formData, notes: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none resize-none"></textarea>
              </div>

              <button type="submit" disabled={isSubmitting} className={`w-full flex justify-center items-center py-4 bg-[#8BA39E] hover:bg-[#7A918C] text-white rounded-xl font-bold shadow-md transition-all ${isSubmitting ? 'opacity-50' : ''}`}>
                <Send className="w-5 h-5 mr-2" /> {isSubmitting ? '傳送中...' : '確認送出回報'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root')); 
    root.render(<App />);
  </script>
</body>
</html>
