<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匯款資訊回報系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#F9F8F6]">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { CheckCircle, XCircle, Send, Edit3, Lock, LogIn, LogOut, Building, Database, Trash2, AlertCircle, ExternalLink, RefreshCw } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, setPersistence, inMemoryPersistence } from 'firebase/auth';
    import { getFirestore, doc, setDoc, onSnapshot, collection, updateDoc, arrayUnion } from 'firebase/firestore';

    // ==========================================
    // 1. Firebase 初始化 (與青森苑系統共用設定)
    // ==========================================
    const firebaseConfig = typeof window !== 'undefined' && window.__firebase_config 
      ? JSON.parse(window.__firebase_config) 
      : {
          apiKey: "AIzaSyDREvduzrja4xjF-RCpKa-qv45JZCw9tjI",
          authDomain: "gen-lang-client-0168131217.firebaseapp.com",
          projectId: "gen-lang-client-0168131217",
          storageBucket: "gen-lang-client-0168131217.firebasestorage.app",
          messagingSenderId: "620488371764",
          appId: "1:620488371764:web:d5eb9d1dff62d66bab2461"
        };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const defaultAppId = typeof window !== 'undefined' && window.__app_id ? window.__app_id : 'qingsenyuan-admin'; 

    // 定義所有期款階段，供系統全局使用
    const PAYMENT_STAGES = [
      { k: '訂金', l: '訂金' },
      { k: '簽約', l: '簽約金' },
      { k: '2F', l: '2F工程' },
      { k: '5F', l: '5F工程' },
      { k: '7F', l: '7F工程' },
      { k: '10F', l: '10F工程' },
      { k: '13F', l: '13F工程' },
      { k: '使照', l: '使照款' },
      { k: '銀貸', l: '銀貸' },
      { k: '交屋', l: '交屋款' }
    ];

    function App() {
      const [route, setRoute] = useState('form');
      const [isAdminAuth, setIsAdminAuth] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [loginError, setLoginError] = useState('');
      
      const [user, setUser] = useState(null);
      const [isReady, setIsReady] = useState(false);
      const [authError, setAuthError] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState("連線資料庫中...");

      const [masterUnits, setMasterUnits] = useState({}); 
      
      const [reconciledRems, setReconciledRems] = useState([]); 
      const [pendingRems, setPendingRems] = useState([]);
      const [invoices, setInvoices] = useState({});       

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof window !== 'undefined' && window.__initial_auth_token) {
              await signInWithCustomToken(auth, window.__initial_auth_token);
            } else {
              // 【終極修復】：不再嘗試正常登入，直接「強制」使用純記憶體模式。
              // 這樣可以 100% 繞過三星瀏覽器、LINE、以及 Chrome 嚴格隱私模式的所有暫存阻擋。
              await setPersistence(auth, inMemoryPersistence);
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("登入初始化失敗:", error);
            setAuthError(true);
          }
        };
        
        initAuth();
        const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
          if (u) setUser(u);
        });
        return () => unsubscribeAuth();
      }, []);

      // 超時防卡死機制：如果在 LINE 開啟導致長時間沒有回應，提示用戶切換瀏覽器
      useEffect(() => {
        if (isReady || authError) return;
        const timer = setTimeout(() => {
          setLoadingMsg("網路連線似乎較慢，請稍候... 若持續轉圈，請嘗試重新載入網頁。");
        }, 5000);
        return () => clearTimeout(timer);
      }, [isReady, authError]);

      useEffect(() => {
        if (!user) return;

        const appId = typeof window !== 'undefined' && window.__app_id ? window.__app_id : defaultAppId;
        
        const unsubCustom = onSnapshot(
          doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions'), 
          (snap) => {
            if (snap.exists()) {
              setReconciledRems(snap.data().remittances || []);
            } else {
              setReconciledRems([]);
            }
          },
          (error) => console.error("讀取已對帳紀錄失敗:", error)
        );

        const unsubPending = onSnapshot(
          doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'pending_remittances'), 
          (snap) => {
            if (snap.exists()) {
              setPendingRems(snap.data().remittances || []);
            } else {
              setPendingRems([]);
            }
          },
          (error) => console.error("讀取待對帳紀錄失敗:", error)
        );

        const unsubInv = onSnapshot(
          doc(db, 'artifacts', appId, 'public', 'data', 'invoices', 'all_invoices'), 
          (snap) => {
            if (snap.exists()) setInvoices(snap.data());
          },
          (error) => console.error("讀取發票資料失敗:", error)
        );

        const unsubMaster = onSnapshot(
          collection(db, 'artifacts', appId, 'public', 'data', 'master_sheets'), 
          (snap) => {
            const units = {};
            snap.forEach(docSnap => {
              const rows = docSnap.data().rows || [];
              rows.forEach(row => {
                let f = String(row['樓層'] || '').trim().replace(/\.0$/, '');
                let u = String(row['編號'] || '').trim().replace(/\.0$/, '');
                
                const combined = String(row['戶別'] || row['戶名'] || '').trim().replace(/\.0$/, '');
                if (combined && (!f || !u)) {
                  const match = combined.match(/^(\d+)([A-Z]\d*)$/i);
                  if (match) { f = match[1]; u = match[2]; } else { u = combined; }
                }

                if (f && u && !f.includes('合計') && !f.includes('總計')) {
                  const unitKey = `${f}_${u}`;
                  
                  if (!units[unitKey]) {
                    units[unitKey] = { floor: f, unit: u, buyer: '未填寫', stages: {} };
                  }

                  const buyer = row['買方'] || row['姓名'] || row['客戶名稱'] || '';
                  if (buyer.trim() !== '' && units[unitKey].buyer === '未填寫') {
                    units[unitKey].buyer = buyer.trim();
                  }

                  PAYMENT_STAGES.forEach(stage => {
                    const stKey = stage.k;
                    let contractAmt = 0;
                    let paidAmt = 0;
                    let unpaidAmt = NaN;

                    Object.keys(row).forEach(key => {
                      const valStr = String(row[key] || '').replace(/,/g, '');
                      const val = parseFloat(valStr) || 0;
                      if (key.includes(stKey)) {
                         if (key.includes('應收') || key.includes('應付')) contractAmt += val;
                         if (key.includes('已付') || key.includes('實收')) paidAmt += val;
                         if (key.includes('未付') || key.includes('餘額')) unpaidAmt = parseFloat(valStr);
                      }
                    });

                    let finalUnpaid = 0;
                    if (!isNaN(unpaidAmt) && unpaidAmt !== 0) {
                       finalUnpaid = unpaidAmt;
                    } else if (contractAmt > 0) {
                       finalUnpaid = contractAmt - paidAmt;
                    }

                    if (row[`${stKey}-未付`] !== undefined && String(row[`${stKey}-未付`]).trim() !== '') {
                        finalUnpaid = parseFloat(String(row[`${stKey}-未付`]).replace(/,/g, '')) || 0;
                    } else if (row[`${stKey}-應收`] !== undefined && String(row[`${stKey}-應收`]).trim() !== '') {
                        const specificContract = parseFloat(String(row[`${stKey}-應收`]).replace(/,/g, '')) || 0;
                        const specificPaid = parseFloat(String(row[`${stKey}-已付`] || '0').replace(/,/g, '')) || 0;
                        finalUnpaid = specificContract - specificPaid;
                    }

                    units[unitKey].stages[stKey] = (units[unitKey].stages[stKey] || 0) + finalUnpaid;
                  });
                }
              });
            });
            setMasterUnits(units);
            setIsReady(true);
          },
          (error) => {
            console.error("讀取母檔資料失敗:", error);
            setIsReady(true); 
          }
        );

        return () => { unsubCustom(); unsubPending(); unsubInv(); unsubMaster(); };
      }, [user]);

      useEffect(() => {
        const handleHashChange = () => setRoute(window.location.hash === '#admin' ? 'admin' : 'form');
        window.addEventListener('hashchange', handleHashChange);
        handleHashChange();
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      const handleLogin = (e) => {
        e.preventDefault();
        if (passwordInput === 'admin123') {
          setIsAdminAuth(true); setLoginError(''); setPasswordInput('');
        } else {
          setLoginError('密碼錯誤');
        }
      };

      const handleLogout = () => {
        setIsAdminAuth(false);
        window.location.hash = '';
      };

      if (authError) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#F9F8F6] p-4 sm:p-6">
            <div className="bg-white p-8 rounded-2xl shadow-sm border border-[#EAEAEA] text-center max-w-md w-full">
              <AlertCircle className="w-16 h-16 text-orange-400 mx-auto mb-4" />
              <h2 className="text-2xl font-bold text-gray-800 mb-3">網路連線異常</h2>
              <p className="text-base text-gray-600 mb-6 text-left leading-relaxed">
                系統暫時無法與資料庫建立穩定連線，這可能是由於您的網路環境或手機瀏覽器設定較為嚴格所導致。<br/><br/>
                請點擊下方按鈕重新載入網頁，或更換網路環境後再試一次。
              </p>
              <button
                onClick={() => window.location.reload()}
                className="w-full flex justify-center items-center py-4 px-4 bg-[#8BA39E] hover:bg-[#7A918C] text-white rounded-xl font-bold text-lg transition-colors shadow-md mb-3"
              >
                <RefreshCw className="w-6 h-6 mr-2" />
                重新嘗試連線
              </button>
              <button
                onClick={() => {
                  const currentUrl = window.location.href;
                  const sep = currentUrl.includes('?') ? '&' : '?';
                  window.location.href = currentUrl + sep + 'openExternalBrowser=1';
                }}
                className="w-full flex justify-center items-center py-3 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-bold text-base transition-colors"
              >
                <ExternalLink className="w-5 h-5 mr-2" />
                點我使用外部瀏覽器開啟
              </button>
            </div>
          </div>
        );
      }

      if (!isReady) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-[#F9F8F6] p-6">
            <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-[#8BA39E] mb-6"></div>
            <p className="text-[#8BA39E] font-medium text-sm text-center max-w-xs leading-relaxed">{loadingMsg}</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F9F8F6] text-[#4A4A4A] font-sans relative">
          {route === 'form' && <ResidentForm masterUnits={masterUnits} />}
          {route === 'admin' && !isAdminAuth && <AdminLogin passwordInput={passwordInput} setPasswordInput={setPasswordInput} handleLogin={handleLogin} loginError={loginError} />}
          {route === 'admin' && isAdminAuth && <AdminDashboard pendingRems={pendingRems} reconciledRems={reconciledRems} invoices={invoices} masterUnits={masterUnits} handleLogout={handleLogout} />}
        </div>
      );
    }

    function ResidentForm({ masterUnits }) {
      const [formData, setFormData] = useState({ unitKey: '', remitDate: '', accountLast5: '', remitterName: '', amount: '', notes: '' });
      const [submitSuccess, setSubmitSuccess] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      const sortedUnitKeys = Object.keys(masterUnits).sort((a, b) => {
        const fA = parseInt(a.split('_')[0], 10) || 0;
        const fB = parseInt(b.split('_')[0], 10) || 0;
        if (fA !== fB) return fA - fB;
        return a.localeCompare(b);
      });

      const handleFormSubmit = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        const appId = typeof window !== 'undefined' && window.__app_id ? window.__app_id : defaultAppId;
        
        const newRemittance = {
          id: Date.now().toString(),
          unitKey: formData.unitKey,               
          匯款日期: formData.remitDate.replace(/-/g, '/'), 
          匯款金額: Number(formData.amount),
          帳號後五碼: formData.accountLast5,
          匯款帳戶戶名: formData.remitterName,
          備註: formData.notes,
          _isCustom: true,                         
          submittedAt: new Date().toISOString()
        };

        try {
          const docRef = doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'custom', 'pending_remittances');
          await setDoc(docRef, { remittances: arrayUnion(newRemittance) }, { merge: true });
          
          setSubmitSuccess(true);
          setFormData({ unitKey: '', remitDate: '', accountLast5: '', remitterName: '', amount: '', notes: '' });
          setTimeout(() => setSubmitSuccess(false), 8000);
        } catch (error) {
          console.error("寫入失敗:", error);
          alert("傳送失敗，請稍後再試。");
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="py-12 px-4 sm:px-6 lg:px-8">
          <div className="max-w-xl mx-auto bg-white p-8 md:p-10 rounded-2xl shadow-sm border border-[#EAEAEA]">
            <div className="mb-8 text-center">
              <div className="w-16 h-16 bg-[#F0EFEA] rounded-full flex items-center justify-center mx-auto mb-4">
                <Building className="w-8 h-8 text-[#8BA39E]" />
              </div>
              <h2 className="text-2xl font-bold text-[#4A4A4A] tracking-wide mb-2">瀞川日禾-匯款資訊回報</h2>
              <p className="text-sm text-gray-500">感謝您的配合，請填寫匯款資料以便我們為您對帳。</p>
            </div>

            {submitSuccess && (
              <div className="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg flex items-center shadow-sm">
                <CheckCircle className="w-5 h-5 mr-3 flex-shrink-0" />
                <div>
                  <p className="font-bold">資料已成功送出！</p>
                  <p className="text-sm mt-1">確認收到款項後，公司會再LINE回覆給您，若有其他疑問可於官方LINE提出，或此處提出您的問題，謝謝。</p>
                </div>
              </div>
            )}

            <form onSubmit={handleFormSubmit} className="space-y-6">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1.5">戶別</label>
                <select 
                  required value={formData.unitKey} onChange={(e) => setFormData({...formData, unitKey: e.target.value})}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] focus:border-transparent outline-none bg-white transition-shadow"
                >
                  <option value="" disabled>請選擇您的戶別</option>
                  {sortedUnitKeys.map(key => (
                    <option key={key} value={key}>
                      {masterUnits[key].floor}{masterUnits[key].unit}
                    </option>
                  ))}
                </select>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">匯款日期</label>
                  <input type="date" required value={formData.remitDate} onChange={(e) => setFormData({...formData, remitDate: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">匯款金額 (新台幣)</label>
                  <input type="number" required min="0" placeholder="請輸入純數字，不含逗號" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">匯款人 (匯款帳戶戶名)</label>
                  <input type="text" required placeholder="例如：王小明" value={formData.remitterName} onChange={(e) => setFormData({...formData, remitterName: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">匯款人帳號後五碼</label>
                  <input type="text" required maxLength="5" pattern="\d{5}" placeholder="例如：12345" value={formData.accountLast5} onChange={(e) => setFormData({...formData, accountLast5: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1.5">備註 (選填)</label>
                <textarea rows="3" value={formData.notes} onChange={(e) => setFormData({...formData, notes: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none resize-none"></textarea>
              </div>

              <button type="submit" disabled={isSubmitting} className={`w-full flex justify-center items-center py-3.5 px-4 rounded-lg font-medium transition-colors shadow-sm ${isSubmitting ? 'bg-gray-400 cursor-not-allowed text-white' : 'bg-[#8BA39E] hover:bg-[#7A918C] text-white'}`}>
                <Send className="w-5 h-5 mr-2" /> {isSubmitting ? '傳送中...' : '確認送出回報'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function AdminLogin({ passwordInput, setPasswordInput, handleLogin, loginError }) {
      return (
        <div className="min-h-screen flex items-center justify-center px-4">
          <div className="max-w-md w-full bg-white p-8 rounded-2xl shadow-sm border border-[#EAEAEA]">
            <div className="text-center mb-8">
              <div className="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4"><Lock className="w-6 h-6 text-gray-600" /></div>
              <h2 className="text-xl font-bold text-gray-800">對帳系統後台登入</h2>
            </div>
            <form onSubmit={handleLogin} className="space-y-6">
              <div>
                <input type="password" required placeholder="請輸入密碼" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-gray-800 text-center tracking-widest outline-none" />
                {loginError && <p className="text-red-500 text-sm mt-2 text-center">{loginError}</p>}
              </div>
              <button type="submit" className="w-full flex justify-center items-center bg-gray-800 hover:bg-gray-900 text-white py-3 rounded-lg font-medium"><LogIn className="w-5 h-5 mr-2" />登入</button>
            </form>
          </div>
        </div>
      );
    }

    function AdminDashboard({ pendingRems, reconciledRems, invoices, masterUnits, handleLogout }) {
      const [selectedStage, setSelectedStage] = useState('使照');

      const combinedRemittances = useMemo(() => {
        const p = pendingRems.map(r => ({ ...r, _isReconciled: false }));
        const r = reconciledRems.map(r => ({ ...r, _isReconciled: true }));
        return [...p, ...r].sort((a, b) => (b.id || 0) - (a.id || 0));
      }, [pendingRems, reconciledRems]);

      const updateInvoiceData = async (remittanceId, field, value) => {
        const appId = typeof window !== 'undefined' && window.__app_id ? window.__app_id : defaultAppId;
        const docRef = doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'invoices', 'all_invoices');
        
        const updatePayload = {
          [`${remittanceId}.${field}`]: value
        };
        
        try {
          await updateDoc(docRef, updatePayload);
        } catch (e) {
          await setDoc(docRef, { [remittanceId]: { [field]: value } }, { merge: true });
        }
      };

      const handleToggleReconcile = async (rem, checked) => {
        const appId = typeof window !== 'undefined' && window.__app_id ? window.__app_id : defaultAppId;
        const additionsRef = doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'custom', 'additions');
        const pendingRef = doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'custom', 'pending_remittances');

        const cleanRem = { ...rem };
        delete cleanRem._isReconciled;

        try {
          updateInvoiceData(rem.id, '已對帳', checked);

          if (checked) {
            const newPending = pendingRems.filter(r => r.id !== rem.id);
            await setDoc(pendingRef, { remittances: newPending }, { merge: true });
            await setDoc(additionsRef, { remittances: arrayUnion(cleanRem) }, { merge: true });
          } else {
            const newReconciled = reconciledRems.filter(r => r.id !== rem.id);
            await setDoc(additionsRef, { remittances: newReconciled }, { merge: true });
            await setDoc(pendingRef, { remittances: arrayUnion(cleanRem) }, { merge: true });
          }
        } catch (error) {
          console.error("狀態切換失敗:", error);
          alert("狀態切換失敗，請稍後再試。");
        }
      };

      const handleDeleteRemittance = async (rem) => {
        if (!window.confirm("確定要刪除這筆回報紀錄嗎？")) return;
        const appId = typeof window !== 'undefined' && window.__app_id ? window.__app_id : defaultAppId;
        
        try {
          if (rem._isReconciled) {
            const docRef = doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'custom', 'additions');
            const updated = reconciledRems.filter(r => r.id !== rem.id);
            await setDoc(docRef, { remittances: updated }, { merge: true });
          } else {
            const docRef = doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'custom', 'pending_remittances');
            const updated = pendingRems.filter(r => r.id !== rem.id);
            await setDoc(docRef, { remittances: updated }, { merge: true });
          }
        } catch (error) {
          console.error("刪除失敗:", error);
          alert("刪除失敗，請稍後再試。");
        }
      };

      const stageLabel = PAYMENT_STAGES.find(s => s.k === selectedStage)?.l || selectedStage;

      return (
        <div className="py-6 px-4 sm:px-6 lg:px-8">
          <div className="max-w-7xl mx-auto mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-4 rounded-xl shadow-sm border border-[#EAEAEA] gap-4">
            <div className="flex items-center">
              <Lock className="w-5 h-5 text-[#8BA39E] mr-2" />
              <h1 className="text-lg font-bold text-gray-800">內部對帳管理中心</h1>
            </div>
            
            <div className="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
              <div className="flex items-center bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200">
                <span className="text-sm font-bold text-gray-600 mr-2">對帳期款目標：</span>
                <select 
                  value={selectedStage}
                  onChange={(e) => setSelectedStage(e.target.value)}
                  className="bg-white border border-gray-300 rounded text-sm px-2 py-1 outline-none focus:ring-1 focus:ring-[#8BA39E] text-gray-700 font-medium"
                >
                  {PAYMENT_STAGES.map(s => (
                    <option key={s.k} value={s.k}>{s.l}</option>
                  ))}
                </select>
              </div>
              <button onClick={handleLogout} className="flex items-center text-sm text-gray-500 hover:text-gray-800 whitespace-nowrap"><LogOut className="w-4 h-4 mr-1" /> 登出</button>
            </div>
          </div>

          <div className="max-w-7xl mx-auto bg-white rounded-xl shadow-sm border border-[#EAEAEA] overflow-hidden">
            <div className="overflow-x-auto w-full">
              <table className="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                  <tr className="bg-[#F0EFEA] text-[#4A4A4A] text-sm">
                    <th className="p-4 font-medium">狀態</th>
                    <th className="p-4 font-medium">戶別 / 買方</th>
                    <th className="p-4 font-medium">匯款日期 / 帳號資訊</th>
                    <th className="p-4 font-medium">金額比對 ({stageLabel})</th>
                    <th className="p-4 font-medium">發票日期 (自動同步)</th>
                    <th className="p-4 font-medium">發票號碼 (自動同步)</th>
                    <th className="p-4 font-medium text-center">操作</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100 text-sm">
                  {combinedRemittances.map((sub) => {
                    const master = masterUnits[sub.unitKey];
                    const invData = invoices[sub.id] || {};
                    
                    const expectedAmt = master?.stages?.[selectedStage] || 0;
                    const isReconciled = sub._isReconciled; 

                    return (
                      <tr key={sub.id} className="hover:bg-gray-50 transition-colors">
                        <td className="p-4">
                          <label className="flex items-center cursor-pointer">
                            <input 
                              type="checkbox" 
                              checked={isReconciled} 
                              onChange={(e) => handleToggleReconcile(sub, e.target.checked)} 
                              className="w-5 h-5 text-[#8BA39E] rounded cursor-pointer" 
                            />
                            <span className={`ml-2 font-medium ${isReconciled ? 'text-green-600' : 'text-gray-400'}`}>
                              {isReconciled ? '已對帳' : '待處理'}
                            </span>
                          </label>
                        </td>
                        <td className="p-4">
                          <div className="font-semibold text-gray-800">{master ? `${master.floor}${master.unit}` : sub.unitKey}</div>
                          <div className="text-xs text-gray-500">{master ? master.buyer : '未找到買方'}</div>
                        </td>
                        <td className="p-4">
                          <div>{sub.匯款日期}</div>
                          <div className="text-xs text-gray-500 font-mono">帳號: {sub.帳號後五碼 || '無資料'}</div>
                          <div className="text-xs text-gray-500">戶名: {sub.匯款帳戶戶名 || '未填寫'}</div>
                        </td>
                        <td className="p-4">
                          <div className="flex items-center">
                            <span className="font-semibold text-[#8BA39E]">${(sub.匯款金額 || 0).toLocaleString()}</span>
                            {sub.匯款金額 === expectedAmt && expectedAmt > 0 ? (
                              <CheckCircle className="w-4 h-4 text-green-500 ml-2" title="金額相符" />
                            ) : expectedAmt > 0 ? (
                              <XCircle className="w-4 h-4 text-orange-400 ml-2" title="金額不符" />
                            ) : null}
                          </div>
                          <div className="text-xs text-gray-500">應收{stageLabel}: ${expectedAmt.toLocaleString()}</div>
                        </td>
                        <td className="p-4">
                          <input type="date" value={invData['發票日期'] ? invData['發票日期'].replace(/\//g, '-') : ''} onChange={(e) => updateInvoiceData(sub.id, '發票日期', e.target.value.replace(/-/g, '/'))} className="px-2 py-1 border rounded text-sm outline-none focus:ring-1 focus:ring-[#8BA39E]" />
                        </td>
                        <td className="p-4">
                          <div className="flex items-center">
                            <Edit3 className="w-4 h-4 text-gray-400 mr-1" />
                            <input type="text" placeholder="例如: AB12345678" value={invData['發票號碼'] || ''} onChange={(e) => updateInvoiceData(sub.id, '發票號碼', e.target.value)} className="w-32 px-2 py-1 border rounded text-sm outline-none focus:ring-1 focus:ring-[#8BA39E] font-mono" />
                          </div>
                        </td>
                        <td className="p-4 text-center">
                          <button onClick={() => handleDeleteRemittance(sub)} className="text-red-400 hover:text-red-600 transition-colors p-1" title="刪除此紀錄">
                            <Trash2 className="w-4 h-5 mx-auto" />
                          </button>
                        </td>
                      </tr>
                    );
                  })}
                  {combinedRemittances.length === 0 && (
                    <tr><td colSpan="7" className="p-8 text-center text-gray-400">目前尚無匯款回報紀錄</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root')); 
    root.render(<App />);
  </script>
</body>
</html>
