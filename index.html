<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瀞川日禾-匯款資訊回報</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#F9F8F6]">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { CheckCircle, Send, Building } from 'lucide-react';
    import { initializeApp, getApps } from 'firebase/app';
    import { getAuth, initializeAuth, inMemoryPersistence, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
    import { getFirestore, doc, setDoc, onSnapshot, collection, arrayUnion } from 'firebase/firestore';

    const firebaseConfig = typeof window !== 'undefined' && window.__firebase_config 
      ? JSON.parse(window.__firebase_config) 
      : {
          apiKey: "AIzaSyDREvduzrja4xjF-RCpKa-qv45JZCw9tjI",
          authDomain: "gen-lang-client-0168131217.firebaseapp.com",
          projectId: "gen-lang-client-0168131217",
          storageBucket: "gen-lang-client-0168131217.firebasestorage.app",
          messagingSenderId: "620488371764",
          appId: "1:620488371764:web:d5eb9d1dff62d66bab2461"
        };

    const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
    
    // 初始化 Auth，處理不同的環境 (強制記憶體模式避免手機阻擋)
    let auth;
    try {
      auth = initializeAuth(app, { persistence: inMemoryPersistence });
    } catch (e) {
      auth = getAuth(app);
    }
    
    const db = getFirestore(app);
    const defaultAppId = typeof window !== 'undefined' && window.__app_id ? window.__app_id : 'qingsenyuan-admin'; 

    function App() {
      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false); // 新增：安全鎖機制
      const [isReady, setIsReady] = useState(false);
      const [masterUnits, setMasterUnits] = useState({}); 

      const [formData, setFormData] = useState({ unitKey: '', remitDate: '', accountLast5: '', remitterName: '', amount: '', notes: '' });
      const [submitSuccess, setSubmitSuccess] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      useEffect(() => {
        const initAuth = async () => {
          try {
            // 確保先取得授權憑證
            if (typeof window !== 'undefined' && window.__initial_auth_token) {
              await signInWithCustomToken(auth, window.__initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
            // 憑證拿到了，才解開安全鎖
            setAuthReady(true);
          } catch (error) {
            console.error("登入初始化失敗:", error);
          }
        };
        
        initAuth();

        const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
          setUser(u);
        });
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        // 【關鍵修復】必須等到 user 存在 且 authReady 解鎖，才去讀取資料庫，避免 Permission Denied
        if (!user || !authReady) return;
        
        const appId = defaultAppId;
        const unsubMaster = onSnapshot(
          collection(db, 'artifacts', appId, 'public', 'data', 'master_sheets'), 
          (snap) => {
            const units = {};
            snap.forEach(docSnap => {
              const rows = docSnap.data().rows || [];
              rows.forEach(row => {
                let f = String(row['樓層'] || '').trim().replace(/\.0$/, '');
                let u = String(row['編號'] || '').trim().replace(/\.0$/, '');
                const combined = String(row['戶別'] || row['戶名'] || '').trim().replace(/\.0$/, '');
                if (combined && (!f || !u)) {
                  const match = combined.match(/^(\d+)([A-Z]\d*)$/i);
                  if (match) { f = match[1]; u = match[2]; } else { u = combined; }
                }
                if (f && u && !f.includes('合計') && !f.includes('總計')) {
                  const unitKey = `${f}_${u}`;
                  if (!units[unitKey]) {
                    units[unitKey] = { floor: f, unit: u };
                  }
                }
              });
            });
            setMasterUnits(units);
            setIsReady(true);
          },
          (error) => {
            console.error("載入戶別失敗:", error);
            setIsReady(true);
          }
        );
        return () => unsubMaster();
      }, [user, authReady]);

      const sortedUnitKeys = Object.keys(masterUnits).sort((a, b) => {
        const fA = parseInt(a.split('_')[0], 10) || 0;
        const fB = parseInt(b.split('_')[0], 10) || 0;
        if (fA !== fB) return fA - fB;
        return a.localeCompare(b);
      });

      const handleFormSubmit = async (e) => {
        e.preventDefault();
        
        if (!user || !authReady) {
            alert("尚未建立安全連線，請稍後再試。");
            return;
        }

        setIsSubmitting(true);
        const appId = defaultAppId;
        
        const newRemittance = {
          id: Date.now().toString(),
          unitKey: formData.unitKey,               
          匯款日期: formData.remitDate.replace(/-/g, '/'), 
          匯款金額: Number(formData.amount),
          帳號後五碼: formData.accountLast5,
          匯款帳戶戶名: formData.remitterName,
          備註: formData.notes,
          _isCustom: true,                         
          submittedAt: new Date().toISOString()
        };

        try {
          const docRef = doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'custom', 'pending_remittances');
          await setDoc(docRef, { remittances: arrayUnion(newRemittance) }, { merge: true });
          
          setSubmitSuccess(true);
          setFormData({ unitKey: '', remitDate: '', accountLast5: '', remitterName: '', amount: '', notes: '' });
          setTimeout(() => setSubmitSuccess(false), 8000);
        } catch (error) {
          console.error("寫入失敗:", error);
          alert("傳送失敗，請確認網路連線後再試。");
        } finally {
          setIsSubmitting(false);
        }
      };

      if (!isReady) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-[#F9F8F6] p-6">
            <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-[#8BA39E] mb-6"></div>
            <p className="text-[#8BA39E] font-medium text-sm text-center">安全連線建立中...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F9F8F6] text-[#4A4A4A] font-sans py-12 px-4 sm:px-6 lg:px-8">
          <div className="max-w-xl mx-auto bg-white p-8 md:p-10 rounded-2xl shadow-sm border border-[#EAEAEA]">
            <div className="mb-8 text-center">
              <div className="w-16 h-16 bg-[#F0EFEA] rounded-full flex items-center justify-center mx-auto mb-4">
                <Building className="w-8 h-8 text-[#8BA39E]" />
              </div>
              <h2 className="text-2xl font-bold text-[#4A4A4A] tracking-wide mb-2">瀞川日禾-匯款資訊回報</h2>
              <p className="text-sm text-gray-500">感謝您的配合，請填寫匯款資料以便我們為您對帳。</p>
            </div>

            {submitSuccess && (
              <div className="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg flex items-center shadow-sm">
                <CheckCircle className="w-5 h-5 mr-3 flex-shrink-0" />
                <div>
                  <p className="font-bold">資料已成功送出！</p>
                  <p className="text-sm mt-1">確認收到款項後，公司會再LINE回覆給您，若有其他疑問可於官方LINE提出，或此處提出您的問題，謝謝。</p>
                </div>
              </div>
            )}

            <form onSubmit={handleFormSubmit} className="space-y-6">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1.5">戶別</label>
                <select 
                  required value={formData.unitKey} onChange={(e) => setFormData({...formData, unitKey: e.target.value})}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] focus:border-transparent outline-none bg-white transition-shadow"
                >
                  <option value="" disabled>請選擇您的戶別</option>
                  {sortedUnitKeys.map(key => (
                    <option key={key} value={key}>
                      {masterUnits[key].floor}{masterUnits[key].unit}
                    </option>
                  ))}
                </select>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">匯款日期</label>
                  <input type="date" required value={formData.remitDate} onChange={(e) => setFormData({...formData, remitDate: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">匯款金額 (新台幣)</label>
                  <input type="number" required min="0" placeholder="請輸入純數字，不含逗號" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">匯款人 (匯款帳戶戶名)</label>
                  <input type="text" required placeholder="例如：王小明" value={formData.remitterName} onChange={(e) => setFormData({...formData, remitterName: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">匯款人帳號後五碼</label>
                  <input type="text" required maxLength="5" pattern="\d{5}" placeholder="例如：12345" value={formData.accountLast5} onChange={(e) => setFormData({...formData, accountLast5: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none" />
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1.5">備註 (選填)</label>
                <textarea rows="3" value={formData.notes} onChange={(e) => setFormData({...formData, notes: e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8BA39E] outline-none resize-none"></textarea>
              </div>

              <button type="submit" disabled={isSubmitting} className={`w-full flex justify-center items-center py-3.5 px-4 rounded-lg font-medium transition-colors shadow-sm ${isSubmitting ? 'bg-gray-400 cursor-not-allowed text-white' : 'bg-[#8BA39E] hover:bg-[#7A918C] text-white'}`}>
                <Send className="w-5 h-5 mr-2" /> {isSubmitting ? '傳送中...' : '確認送出回報'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root')); 
    root.render(<App />);
  </script>
</body>
</html>
